<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-item lines="none">
      <ion-icon name="chevron-back-outline" color="warning" size="large" (click)="closemodal()" slot="start"></ion-icon>
      <ion-text slot="start" class="font-size-14" color="primary">Nouveau fournisseur</ion-text>
      <ion-icon name="checkmark-outline" size="large" color="success" (click)="addnew()" slot="end"></ion-icon>
    </ion-item>
  </ion-toolbar>
  <ion-progress-bar mode="ios" type="indeterminate" *ngIf="showprogress" ></ion-progress-bar>
</ion-header>
<ion-content class="contentbody">
  <br>
  <div class="mobileform">
    <form class="contentbody form" [formGroup]="newprovider">
      <ion-card mode="ios" class="ion-padding-top ion-padding-bottom">
        <ion-text class="font-size-12 ion-padding-start" color="primary">Cochez un Type</ion-text> 
        <br> <br>
        <ion-segment formControlName="type" mode="ios">
          <ion-segment-button value="physique" (click)="editType('physique')">Physique</ion-segment-button>
          <ion-segment-button value="moral" (click)="editType('moral')">Moral</ion-segment-button>
        </ion-segment>
      </ion-card>
      <ion-card mode="ios">
        <ion-item lines="full" class="font-size-12 contentbody">
          <ion-input placeholder="Nom" type="text" formControlName="providerName" #defaultinput></ion-input>
        </ion-item>
        
        <ion-item lines="full" class="font-size-12 contentbody">
          <ion-input placeholder="Téléphone" type="phone" formControlName="phone"></ion-input>
        </ion-item> 
        <ion-item lines="full" class="font-size-12 contentbody">
          <ion-input placeholder="Email" type="mail" formControlName="mail"></ion-input>
        </ion-item> 
        <ion-item lines="none" class="font-size-12 contentbody">
          <ion-input placeholder="Adresse" type="text" formControlName="adress"></ion-input>
        </ion-item>
      </ion-card>
    </form>
  </div>
</ion-content>
