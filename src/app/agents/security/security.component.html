<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-item lines="none" class="default-list-item">
      <ion-icon name="chevron-back-outline" (click)="appserv.closemodal()" color="primary" size="large"></ion-icon>
      <ion-avatar>
        <ion-img [src]="usersent.avatar?appserv.imgUrl+usersent.avatar:''" *ngIf="usersent.avatar"></ion-img>
        <ion-icon name="person-outline" size="small" *ngIf="!usersent.avatar"></ion-icon>
      </ion-avatar>
      <ion-label>
        <p class="item-label-title">Sécurité</p>
        <p class="secondpara">
          {{(usersent.user_name?usersent.user_name:usersent.user_mail) | titlecase}}
        </p>
      </ion-label>
      <ion-chip slot="end">Rôle : {{usersent.role_title?usersent.role_title:usersent.role_description}}</ion-chip>
      <ion-icon name="refresh" slot="end" (click)="resetPassword()"></ion-icon>
    </ion-item>
  </ion-toolbar>
  <ion-progress-bar type="indeterminate" *ngIf="showprogress" mode="ios"></ion-progress-bar>
</ion-header>
<ion-content class="content-body ion-padding">
  <ion-card class="ion-text-center ion-padding-bottom ion-padding-top border-radius-10" color="warning" lines="none" mode="ios">
    <ion-note class="font-size-11" color="dark">Les modifications de sécurité apportées sur ce compte sont irréversibles.Soyez sûre de cette action ...</ion-note>
  </ion-card>

<ion-footer *ngIf="showsaving">
  <ion-button  (click)="edituser()" mode="ios"  expand="full" class="box-big bd-radius-10">
    <ion-icon name="checkmark-outline" size="large"></ion-icon>
  </ion-button>
</ion-footer>
