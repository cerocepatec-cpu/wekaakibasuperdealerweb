<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-item lines="none">
      <ion-icon name="chevron-back-outline" (click)="appserv.closemodal()" slot="start"></ion-icon>
      <ion-text>{{userSent?'Modifier membre':'Nouveau membre | Agent'}}</ion-text>
      <ion-button mode="ios" *ngIf="appserv.permissionFilter('agents','add')" [disabled]="!agentform.valid" slot="end" color="warning" (click)="addnewagent()">
        <span>Enregistrer</span>
        <ion-icon name="checkmark-outline"  size="small" ></ion-icon>
      </ion-button>
    </ion-item>
  </ion-toolbar>
  <ion-progress-bar type="indeterminate" *ngIf="showcreatingprogress" mode="ios"></ion-progress-bar>
</ion-header>
<ion-content class="contentbody" [fullscreen]="true">
  <br>
  <div class="mobileform">
    <form class="" [formGroup]="agentform">
      <ion-card mode="ios" class="ion-padding-top">
        <ion-text class="font-size-12" color="primary ion-padding-start">Informations de base</ion-text>
        <ion-item lines="full" class="font-size-12">
          <ion-input formControlName="name" placeholder="Nom complet utilisateur (*)" #defaultinput></ion-input>
        </ion-item>
        <ion-item lines="none" class="font-size-12">
          <ion-input formControlName="note" placeholder="Note"></ion-input>
        </ion-item>
      </ion-card>
      <ion-card mode="ios">
        <ion-item lines="none" class="font-size-12" (click)="showothersinfosbloc=!showothersinfosbloc">
          <ion-text color="primary" slot="start">Autres informations</ion-text> &nbsp;
          <ion-icon name="chevron-down-outline" slot="end" size="small" *ngIf="!showothersinfosbloc" color="primary"></ion-icon>
          <ion-icon name="chevron-up-outline" slot="end" size="small" *ngIf="showothersinfosbloc"  color="primary"></ion-icon>
        </ion-item>
        <div class="block">
          <ion-item lines="full" class="font-size-12">
            <ion-input formControlName="email" placeholder="Adresse mail"></ion-input>
          </ion-item>
          <ion-item lines="full" class="font-size-12">
            <ion-input
  type="tel"
  formControlName="user_phone"
  placeholder="+243..."
></ion-input>

<ion-text color="danger" *ngIf="agentform.get('user_phone')?.invalid && agentform.get('user_phone')?.touched">
  Numéro invalide (ex: +243949494949)
</ion-text>
          </ion-item>
          <ion-item lines="none" class="font-size-12">
            <ion-input formControlName="address" placeholder="Adresse"></ion-input>
          </ion-item>
        </div>
      </ion-card>
    </form>
  </div>
</ion-content>
