<ion-content
  [fullscreen]="true"
  class="bg-white dark:bg-slate-900 flex flex-col"
>
  <!-- HEADER -->
  <div class="px-6 pt-8 pb-6 border-b border-gray-200 dark:border-slate-800">
    <div class="flex justify-between items-start">
      <div>
        <h2 class="text-xl font-semibold text-gray-800 dark:text-white">
          {{ rate ? "Modifier le taux" : "Nouveau taux" }}
        </h2>

        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
          Définir le taux de conversion officiel
        </p>
      </div>

      <button
        (click)="close()"
        class="text-sm text-gray-500 hover:text-red-500 transition"
      >
        Fermer
      </button>
    </div>
  </div>

  <!-- FORM CONTENT -->
  <div class="flex-1 overflow-y-auto px-6 py-6">
    <form [formGroup]="form" class="space-y-6">
      <!-- FROM / TO -->
      <div class="grid grid-cols-2 gap-5">
        <div>
          <label
            class="block text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-2"
          >
            De
          </label>

          <select
            formControlName="from_money_id"
            class="w-full rounded-xl border border-gray-300 dark:border-slate-700 bg-gray-50 dark:bg-slate-800 px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none"
          >
            <option value="">Sélectionner</option>
            <option *ngFor="let money of moneys" [value]="money.id">
              {{ money.abreviation }}
            </option>
          </select>
        </div>

        <div>
          <label
            class="block text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-2"
          >
            Vers
          </label>

          <select
            formControlName="to_money_id"
            class="w-full rounded-xl border border-gray-300 dark:border-slate-700 bg-gray-50 dark:bg-slate-800 px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none"
          >
            <option value="">Sélectionner</option>
            <option *ngFor="let money of moneys" [value]="money.id">
              {{ money.abreviation }}
            </option>
          </select>
        </div>
      </div>

      <!-- RATE -->
      <div>
        <label
          class="block text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-2"
        >
          Taux
        </label>

        <input
          type="number"
          step="0.00000001"
          formControlName="rate"
          class="w-full rounded-xl border border-gray-300 dark:border-slate-700 bg-gray-50 dark:bg-slate-800 px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none"
        />
      </div>

      <!-- DATE -->
      <div>
        <label
          class="block text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-2"
        >
          Valide à partir de
        </label>

        <input
          type="datetime-local"
          formControlName="valid_from"
          class="w-full rounded-xl border border-gray-300 dark:border-slate-700 bg-gray-50 dark:bg-slate-800 px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none"
        />
      </div>
    </form>
  </div>

  <div *ngIf="inverseRate" class="mt-3 space-y-1 text-sm ion-padding">
    <div class="text-gray-600 dark:text-gray-300">
      1 {{ fromLabel }} =
      {{ form.value.rate | number : "1.2-8" }}
      {{ toLabel }}
    </div>

    <div class="text-emerald-600 dark:text-emerald-400 font-semibold">
      1 {{ toLabel }} =
      {{ inverseRate | number : "1.2-8" }}
      {{ fromLabel }}
    </div>
  </div>

  <!-- FIXED FOOTER BUTTON -->
  <div class="px-6 pb-6 pt-4 border-t border-gray-200 dark:border-slate-800">
    <button
      (click)="submit()"
      [disabled]="submitting"
      class="w-full py-4 rounded-2xl font-semibold text-white bg-gradient-to-r from-emerald-600 to-emerald-500 hover:shadow-xl hover:scale-[1.02] transition-all duration-200"
    >
      {{ submitting ? "Enregistrement..." : "Enregistrer le taux" }}
    </button>
  </div>
</ion-content>
