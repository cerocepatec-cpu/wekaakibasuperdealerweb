<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-item lines="none">
      <ion-back-button slot="start"></ion-back-button>
      <ion-text slot="start">Nouvelle unité de mesure</ion-text> 
      <ion-icon name="checkmark-outline" slot="end" size="large" (click)="addnewuom()" color="success"></ion-icon>
    </ion-item>
    <ion-progress-bar mode="indeterminate" *ngIf="showcreatingprogress" mode="md"></ion-progress-bar>
  </ion-toolbar>
</ion-header>
<ion-content class="contentbody" [fullscreen]="true">
  <ion-grid>
    <ion-row>
      <ion-col size="12" sizeMd="6" sizeLg="6">
        <div class="newrequestform">
          <form class="ion-padding form" [formGroup]="newuomform">
            <ion-list-header><h2>Informations sur l'unité de mesure</h2></ion-list-header> 
            <ion-item lines="none">
              <ion-label>Nom</ion-label>
              <ion-input placeholder="entrer le nom" formControlName="name"></ion-input>
            </ion-item>
            <ion-item lines="none">
              <ion-label>Symbole</ion-label>
              <ion-input placeholder="entrer le symbole" formControlName="symbol"></ion-input>
            </ion-item>
          </form>
        </div>
      </ion-col>
      <ion-col size="12" sizeMd="6" sizeLg="6">
        <ion-item lines="none" class="contentbody" (click)="showlistgroup=!showlistgroup">
          <ion-text color="primary" slot="end" class="font-size-12" > {{showlistgroup?'Cacher la liste':'Afficher la liste'}}</ion-text>
          <ion-icon name="chevron-down-outline" slot="end" size="small" *ngIf="!showlistgroup" ></ion-icon>
          <ion-icon name="chevron-up-outline" slot="end" size="small" *ngIf="showlistgroup" ></ion-icon>
        </ion-item>
        <div *ngIf="showlistgroup">
          <hr class="hr">
          <ion-list>
            <ion-list-header>
              <h2 class="font-size-14">Unités de mesure disponibles</h2>
             </ion-list-header>
            <ion-searchbar mode="ios" class="font-size-11" placeholder="Rercherche..."></ion-searchbar>
            <ion-item *ngFor="let uom of listunitofmeasures" class="contentbody" (click)="gototoedit(uom)">
              <ion-text>{{uom.name | titlecase}} </ion-text>
              <ion-label class="font-size-11">
                &nbsp; ({{uom.symbol}})
              </ion-label>
              <ion-icon name="document" size="small" slot="end"></ion-icon>
            </ion-item>
          </ion-list>
        </div>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
