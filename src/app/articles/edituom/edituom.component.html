<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-item lines="none">
      <ion-icon name="chevron-back-outline" (click)="closemodal()" slot="start"></ion-icon>
      <ion-text slot="start">Modifier unité de mesure</ion-text> 
      <ion-icon name="checkmark-outline" slot="end" size="large" (click)="edituom()" color="success"></ion-icon>
    </ion-item>
  </ion-toolbar>
  <ion-progress-bar type="indeterminate" *ngIf="showcreatingprogress" mode="ios"></ion-progress-bar>
</ion-header>
<ion-content class="contentbody" [fullscreen]="true">
  <ion-grid>
    <ion-row>
      <ion-col size="12" sizeMd="6" sizeLg="6">
        <div class="newrequestform">
          <form class="ion-padding form" [formGroup]="newuomform">
            <ion-list-header><h2>Informations sur l'unité de mesure</h2></ion-list-header> 
            <ion-item lines="none">
              <ion-label>Nom</ion-label>
              <ion-input placeholder="entrer le nom" formControlName="name"></ion-input>
            </ion-item>
            <ion-item lines="none">
              <ion-label>Symbole</ion-label>
              <ion-input placeholder="entrer le symbole" formControlName="symbol"></ion-input>
            </ion-item>
          </form>
        </div>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
