<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-item lines="none">
      <ion-text color="primary" class="font-size-12" (click)="closemodal()" slot="start">Annuler</ion-text>
      <h4 slot="start" class="font-bold-600 font-size-14">Sélectionner un</h4>
      <ion-icon name="add-outline" size="large" slot="end" (click)="addnewcustomer()"></ion-icon>
    </ion-item>
  </ion-toolbar>
  <ion-progress-bar type="indeterminate" mode="ios" *ngIf="showprogress" ></ion-progress-bar>
</ion-header>
<ion-content class="contentbody">
    <ion-searchbar mode="ios" placeholder="Recherche" class="font-size-12"></ion-searchbar>
  <ion-list class="contentbody">
    <ion-item lines="full" class="font-size-15 contentbody" (click)="noprovider()">
      <ion-icon name="remove-circle-outline" slot="start" color="danger"></ion-icon> <ion-text slot="start" color="danger">Aucun Fournisseur ?</ion-text>
    </ion-item> 
    <ion-item lines="full" *ngFor="let provider of listproviders" (click)="selected(provider)" class="font-size-15 contentbody">
      <ion-text slot="start">{{provider.providerName | titlecase}}</ion-text>
      <ion-icon slot="end" *ngIf="provider.selected"  name="checkmark-circle-outline" color="success" size="small"></ion-icon>
    </ion-item>
  </ion-list>
</ion-content>
