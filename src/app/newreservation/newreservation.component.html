<ion-header class="ion-no-border contentbody">
  <ion-toolbar class="contentbody">
    <ion-item lines="none" mode="ios" class="contentbody">
      <ion-icon name="chevron-back-outline" size="large" color="warning" slot="start" (click)="appserv.closemodal()"></ion-icon>
      <ion-text>Réservation</ion-text>
      <ion-title>{{article.service.name | titlecase}}</ion-title>
    </ion-item>
  </ion-toolbar>
  <ion-progressbar mode="ios" *ngIf="showprogress"></ion-progressbar>
</ion-header>
<ion-content class="contentbody ion-padding">
  <div class="bd-square bd-radius-10">
    <form class="contentbody form" [formGroup]="newreservation">
      <ion-grid>
        <ion-row>
          <ion-col size="12"  (click)="periodfilter()">
            <ion-chip color="secondary">Informations de base</ion-chip> <br>
          </ion-col>
        </ion-row>
        <ion-row>
          <ion-col size="12" size-lg="6">
            <ion-input type="date" formControlName="from" label="Du" labelPlacement="fixed"></ion-input>
          </ion-col> 
          <ion-col size="12" size-lg="6">
            <ion-input type="date" formControlName="to" label="Au" labelPlacement="fixed"></ion-input>
          </ion-col>
          <ion-col size="12">
            <ion-item lines="none" class="colorleftside bd-square bd-radius-10">
              <ion-textarea formControlName="note" autoGrow="true" label="Entrer une note" labelPlacement="floating" class="font-size-12"></ion-textarea>
            </ion-item>
          </ion-col>
          <ion-col size="12">
            <ion-item lines="none" class="colorleftside bd-square bd-radius-10">
              <ion-input formControlName="caution" type="number" label="Caution" labelPlacement="floating" class="font-size-12"></ion-input>
            </ion-item>
          </ion-col>
        </ion-row>
      </ion-grid>
    </form>
  </div>
  <br> 
  <div class="bd-square bd-radius-10">
    <ion-text class="font-size-15 ion-padding-start ion-padding-top">Informations du client</ion-text>
    <hr class="hr">
    <ion-grid>
      <ion-row>
        <ion-col size="12"  >
          <ion-buttons>
            <ion-button mode="ios" (click)="customerpick()"> <ion-chip color="dark" class="font-size-12"><ion-icon name="list-circle" size="small"></ion-icon> &nbsp; Sélectionner</ion-chip></ion-button>
            <ion-button mode="ios" (click)="addcustomer()" [disabled]="actualcustomer.id || actualcustomer.uuid">  <ion-chip color="success" class="font-size-12"><ion-icon name="add-circle"  size="small"></ion-icon> &nbsp; Ajouter</ion-chip></ion-button>
            <ion-button mode="ios"  (click)="editcustomer()" [disabled]="!actualcustomer.id || !actualcustomer.uuid">  <ion-chip color="tertiary" class="font-size-12"><ion-icon name="document" size="small"></ion-icon> &nbsp; Modifier</ion-chip></ion-button>
          </ion-buttons>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col size="12">
          <ion-segment [(ngModel)]="actualcustomer.type" mode="ios">
            <ion-segment-button value="physique">Physique</ion-segment-button>
            <ion-segment-button value="moral">Moral</ion-segment-button>
          </ion-segment>
        </ion-col>
        <ion-col size="12">
          <ion-card mode="ios">
            <ion-item lines="full" class="font-size-12 contentbody">
              <ion-input placeholder="Nom" type="text" [(ngModel)]="actualcustomer.customerName"></ion-input>
            </ion-item>
            <ion-item lines="full" class="font-size-12 contentbody">
              <ion-input placeholder="Téléphone" type="phone" [(ngModel)]="actualcustomer.phone"></ion-input>
            </ion-item> 
            <ion-item lines="full" class="font-size-12 contentbody">
              <ion-input placeholder="Email" type="mail" [(ngModel)]="actualcustomer.mail"></ion-input>
            </ion-item> 
            <ion-item lines="full" class="font-size-12 contentbody">
              <ion-input placeholder="Adresse" type="text" [(ngModel)]="actualcustomer.adress"></ion-input>
            </ion-item>
          </ion-card>
        </ion-col> 
      </ion-row>
    </ion-grid>
  </div> 
  <br> 
  <div class="bd-square bd-radius-10">
    <ion-text class="font-size-15 ion-padding-start ion-padding-top">Informations sur le prix</ion-text>
    <hr class="hr">
    <ion-grid>
      <ion-row>
        <ion-col size="4"  *ngFor="let price of article.prices">
           <ion-chip color="dark" class="font-size-12" (click)="selectprice(price)">{{price.label}} ({{price.price | number}} {{price.abreviation}}) <ion-icon name="checkmark-circle-outline" color="success" size="small" color="success" *ngIf="price.selected"></ion-icon></ion-chip>
        </ion-col>
      </ion-row>
    </ion-grid>
    <hr class="hr">
    
  </div>
</ion-content>
<ion-footer class="ion-no-border ion-padding">
  <ion-button expand="block" slot="start" size="small" class="box-big" color="warning" mode="ios" [disabled]="!newreservation.valid" (click)="validation()">
    <span class="font-size-11">Valider</span>
  </ion-button>
</ion-footer>
