<ion-header class="ion-no-border">
  <ion-toolbar color="light">
    <ion-title mode="md" class="font-size-16">Autres menus</ion-title>
    <ion-buttons slot="end" (click)="appserv.closemodal()">
      <ion-button fill="clear"><ion-icon name="close" slot="icon-only"></ion-icon></ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content class="contentbody">
  <ion-item *ngFor="let item of items" lines="none" (click)="select(item)" class="contentbody cursor-pointer">
      <ion-icon [name]="item.icon" slot="start"></ion-icon>
      <ion-label>{{item.text}}</ion-label>
  </ion-item>
</ion-content>
