<ion-content class="ion-padding">
  <ion-grid>
    <ion-row>
      <ion-col size="4" *ngFor="let sub of submenu" (click)="appserv.closemodal()">
        <ion-tab-button [routerLink]="sub.router" *ngIf="appserv.permissionFilter(sub.name, 'view')">
          <ion-icon [name]="sub.icon" color="warning" aria-hidden="true" class="strock-icon" size="large"></ion-icon>
          <ion-label class="font-bold-600 font-size-12">{{sub.name | titlecase}}</ion-label>
        </ion-tab-button>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
