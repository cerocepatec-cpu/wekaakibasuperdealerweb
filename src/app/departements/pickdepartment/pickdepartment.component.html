<ion-header class="ion-no-border">
  <ion-toolbar class="contentbody">
    <ion-item lines="none">
      <ion-text class="font-size-13">{{'select a department(s)' | translate | titlecase}}</ion-text>
      <ion-chip color="primary" (click)="senddata()" slot="end" [disabled]="listselected.length<=0"><ion-icon name="checkmark-circle-outline" size="large"></ion-icon></ion-chip>
    </ion-item>
  </ion-toolbar>
  <ion-progress-bar mode="ios" type="indeterminate" *ngIf="showprogress"></ion-progress-bar>
</ion-header>
<ion-content class="contentbody ion-padding">
  <ion-searchbar mode="ios" placeholder="Recherche" [(ngModel)]="search"></ion-searchbar>
  <ion-item class="default-list-item" lines="full" *ngFor="let depart of listdeparts | filter: search" (click)="addtolist(depart)">
      <ion-label>
        <ion-text class="iteml-label-title font-size-12">{{depart.department_name}}</ion-text>
        <ion-text class="secondpara font-size-12">{{depart.description}}</ion-text>
      </ion-label>
      <ion-icon name="checkmark-circle-outline" slot="end" color="success" *ngIf="depart.selected"></ion-icon>
  </ion-item>
</ion-content>
