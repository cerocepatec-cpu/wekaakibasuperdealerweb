<ion-header>
  <ion-toolbar>
    <ion-title>Vérification de Sécurité</ion-title>
  </ion-toolbar>
  <ion-progress-bar mode="ios" type="indeterminate" color="warning" *ngIf="showprogress"></ion-progress-bar>
</ion-header>
<ion-content class="contentbody ion-padding">
  <br>
  <form  [formGroup]="credentials" class="form">
    <ion-item class="bd-square bd-radius-10 ion-margin-bottom" lines="none">
      <ion-icon name="person-outline" slot="start"></ion-icon>
      <ion-input type="text" placeholder="Nom utilisateur" formControlName="user_name" autocomplete="false" (ionChange)="senddata()" #username></ion-input>
    </ion-item>   
    <ion-item class="bd-square bd-radius-10 ion-margin-bottom" lines="none">
      <ion-icon name="key-outline" slot="start"></ion-icon>
      <ion-input type="password" placeholder="Mot de passe" formControlName="user_password" autocomplete="false" (ionChange)="senddata()"></ion-input>
    </ion-item>
    <br>
  </form> 
</ion-content>
<ion-footer class="ion-padding ion-no-border">
  <ion-button (click)="senddata()" type="button" class="box-big bd-radius-20" expand="block" color="secondary" mode="ios">Valider</ion-button>
</ion-footer>
