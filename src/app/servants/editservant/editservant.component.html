<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-item lines="none">
      <ion-icon name="arrow-back" color="primary" (click)="appserv.closemodal()" slot="start"></ion-icon>
      <ion-text slot="start" class="font-size-14" color="primary">Modifier serveur</ion-text>
      <ion-chip [disabled]="!newservant.valid" slot="end" (click)="edit()">
        <ion-icon name="checkmark-outline" size="large" color="success"></ion-icon>
      </ion-chip>   
    </ion-item>
  </ion-toolbar>
  <ion-progress-bar mode="ios" type="indeterminate" *ngIf="showprogress" ></ion-progress-bar>
</ion-header>
<ion-content class="contentbody">
  <br>
  <div class="mobileform">
  
    <form class="contentbody form" [formGroup]="newservant">
      <ion-card mode="ios">
        <ion-item lines="full" class="font-size-12 contentbody">
          <ion-input placeholder="Nom" type="text" formControlName="name"></ion-input>
        </ion-item>
        <ion-item lines="full" class="font-size-12 contentbody">
          <ion-input placeholder="Description" type="text" formControlName="description"></ion-input>
        </ion-item>
        
        <ion-item lines="full" class="font-size-12 contentbody">
          <ion-input placeholder="Téléphone" type="phone" formControlName="phone"></ion-input>
        </ion-item> 
        <ion-item lines="full" class="font-size-12 contentbody">
          <ion-input placeholder="Email" type="mail" formControlName="email"></ion-input>
        </ion-item> 
        <ion-item lines="none" class="font-size-12 contentbody">
          <ion-input placeholder="Adresse" type="text" formControlName="address"></ion-input>
        </ion-item>
      </ion-card>
    </form>
  </div>
</ion-content>
