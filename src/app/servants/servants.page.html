<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-item lines="full">
      <ion-text class="font-bold-600 font-size-30" slot="start">Serveurs</ion-text>
      <!-- <ion-text  color="primary" (click)="showcheckbox=!showcheckbox" *ngIf="!showcheckbox && listservants.length>0">Sélectionner</ion-text> -->
      <ion-text  color="primary" (click)="showcheckbox=!showcheckbox; listselectedservants=[];" *ngIf="showcheckbox">Terminer</ion-text>
      <ion-icon name="add-circle-outline" slot="end" (click)="newservant()" *ngIf="!showcheckbox && appserv.permissionFilter('serveurs','add')" size="large" color="primary"></ion-icon>
      <!-- <ion-icon name="print-outline" color="secondary" slot="end" *ngIf="!showcheckbox" size="large"></ion-icon> -->
      <!-- <ion-icon name="download-outline" color="success" slot="end" [matMenuTriggerFor]="menuexport" *ngIf="!showcheckbox" size="large"></ion-icon> -->
      <!-- <ion-icon name="share-outline" color="primary" slot="end" *ngIf="!showcheckbox" size="large"></ion-icon> -->
    </ion-item>
    <mat-menu #menuexport="matMenu">
      <button mat-menu-item ><ion-text class="font-size-12">Exporter en Excel</ion-text></button>
      <button mat-menu-item ><ion-text class="font-size-12">Exporter en PDF</ion-text></button>
    </mat-menu>
  </ion-toolbar>
  <ion-progress-bar type="indeterminate" mode="ios" *ngIf="showprogress" ></ion-progress-bar>
</ion-header>
<ion-content class="contentbody cartpreview-80">

  <ion-item lines="none" class="contentbody margin-left-moins-15">
    <ion-searchbar class="font-size-11"  mode="ios" placeholder="Recherche" [(ngModel)]="keyword"></ion-searchbar>
  </ion-item>

  <ion-card class="bd-radius-10 ion-padding"  color="warning" *ngIf="listservants.length===0" lines="none">
    <ion-text class="font-size-13">Aucun serveur diponible</ion-text>
  </ion-card>

  <ion-item class="default-list-item contentbody"  lines="inset" *ngFor="let serv of listservants |filter:keyword" (click)="servantmenu(serv)" detail="true">
    <ion-checkbox slot="start" *ngIf="showcheckbox" mode="ios" size="small"></ion-checkbox>
    <ion-avatar>
      <ion-img [src]="serv.photo?appserv.imgUrl+serv.photo:''" *ngIf="serv.photo"></ion-img>
      <ion-icon name="person" size="small" *ngIf="!serv.photo"></ion-icon>
    </ion-avatar>
    <ion-label>
      <p class="item-label-title"><ion-text>{{serv.name | titlecase}}</ion-text></p>
      <p class="secondpara"><ion-text>{{serv.description | titlecase}}</ion-text></p>
    </ion-label>
  </ion-item>
</ion-content>
<ion-footer class="ion-no-border" [translucent]="true" *ngIf="showcheckbox && listselectedservants.length>0 && appserv.permissionFilter('serveurs','delete')">
  <ion-toolbar>
    <ion-item lines="none" class="font-size-14">
      <ion-text slot="start" color="danger" (click)="multipledelete()"><ion-icon name="trash-outline"></ion-icon></ion-text>
    </ion-item>
  </ion-toolbar>
</ion-footer>
