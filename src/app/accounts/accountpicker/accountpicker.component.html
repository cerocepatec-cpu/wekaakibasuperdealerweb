<ion-header class="ion-no-border">
  <ion-toolbar class="contentbody">
    <ion-item lines="none" class="contentbody">
      <ion-icon name="chevron-back-outline" (click)="appserv.closemodal()" color="warning" size="large" slot="start"></ion-icon>
      <ion-label>
        <p> <ion-text>Comptes disponibles</ion-text></p>
        <p>
          <span *ngFor="let item of listaccountsselected" class="font-size-10">
            {{item.name}}<ion-text class="font-size-10" *ngIf="listaccountsselected.length>0">;</ion-text> 
          </span>
        </p>
      </ion-label>
      <ion-icon name="add-circle-outline" slot="end" color="primary" (click)="addnewaccount()"></ion-icon>
      <ion-chip slot="end" color="secondary" (click)="sendselected()" *ngIf="listaccountsselected.length>0">
        <ion-icon name="send-outline" size="small"></ion-icon>
      </ion-chip>
    </ion-item>
  </ion-toolbar>
  <ion-progress-bar type="indeterminate" mode="ios" *ngIf="showprogress"></ion-progress-bar>
</ion-header>
<ion-content class="contentbody">
    <ion-searchbar mode="ios" placeholder="Recherche" class="font-size-14" [(ngModel)]="search"#defaultinput></ion-searchbar>
  <ion-list class="contentbody">
    <ion-item lines="full" *ngFor="let account of listaccounts | filter:search" (click)="selectitem(account)" class="font-size-14 contentbody">
      <ion-text slot="start">{{account.name | titlecase}}</ion-text>
      <ion-icon slot="end" *ngIf="account.selected"  name="checkmark-circle-outline" color="success" size="small"></ion-icon>
    </ion-item>
  </ion-list>
</ion-content>
