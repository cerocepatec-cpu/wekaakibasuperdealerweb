<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-item lines="full">
      <ion-button fill="clear" (click)="appserv.smartBack()" slot="start">
       <ion-icon name="chevron-back-outline" size="large" color="warning"></ion-icon>
      </ion-button>
      <ion-text class="font-bold-600 font-size-30" slot="start"
        >Dépôts</ion-text
      >
      <!-- <ion-text slot="start" color="primary" (click)="showcheckbox=!showcheckbox" *ngIf="!showcheckbox && listdeposits.length>0">Sélectionner</ion-text>
      <ion-text slot="start" color="primary" (click)="showcheckbox=!showcheckbox; listselectedDeposits=[];" *ngIf="showcheckbox">Terminer</ion-text> -->
      <ion-icon
        *ngIf="appserv.permissionFilter('depots', 'add')"
        name="add-circle-outline"
        color="primary"
        size="large"
        slot="end"
        (click)="newdeposit()"
      ></ion-icon>
      <!-- <ion-icon name="download-outline" color="primary"  slot="end" [matMenuTriggerFor]="menuexport" *ngIf="!showcheckbox" size="large"></ion-icon> -->
    </ion-item>
  </ion-toolbar>
  <ion-progress-bar
    type="indeterminate"
    *ngIf="showprogress"
    mode="ios"
    color="primary"
  ></ion-progress-bar>
</ion-header>
<ion-content class="contentbody cartpreview-70">
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content
      pullingIcon="chevron-down-circle-outline"
      pullingText="Pull to refresh"
      refreshingSpinner="circles"
      refreshingText="Recharge des données..."
    >
    </ion-refresher-content>
  </ion-refresher>

  <ion-item lines="none" class="contentbody margin-left-moins-15">
    <ion-searchbar
      class="font-size-11"
      mode="ios"
      [(ngModel)]="search"
      placeholder="Recherche"
    ></ion-searchbar>

    <mat-menu #menuexport="matMenu">
      <button mat-menu-item>
        <ion-text class="font-size-11">Exporter en Excel</ion-text>
      </button>
      <button mat-menu-item>
        <ion-text class="font-size-11">Exporter en PDF</ion-text>
      </button>
    </mat-menu>
  </ion-item>

  <ion-item
    class="contentbody default-list-item"
    *ngFor="let deposit of listdeposits | filter:search"
    (click)="depositmenu(deposit)"
    lines="inset"
    detail="true"
  >
    <ion-checkbox
      slot="start"
      *ngIf="showcheckbox"
      mode="ios"
      size="small"
    ></ion-checkbox>
    <ion-avatar slot="start">
      <ion-icon name="document"></ion-icon>
    </ion-avatar>
    <ion-label>
      <p class="item-label-title">
        <ion-text>{{deposit.name | titlecase}}</ion-text>
      </p>
      <p class="secondpara">
        <span class="reqtotalprinted font-size-11"
          >{{deposit.description | titlecase}}</span
        >
      </p>
    </ion-label>
    <ion-chip class="font-size-10"
      >{{deposit.withdrawing_method | uppercase}}</ion-chip
    >
  </ion-item>
</ion-content>
<ion-footer
  class="ion-no-border"
  [translucent]="true"
  *ngIf="showcheckbox && listselectedDeposits.length>0"
>
  <ion-toolbar>
    <ion-item lines="none" class="font-size-14">
      <ion-text slot="start" color="danger" (click)="multipledelete()"
        ><ion-icon name="trash-outline"></ion-icon
      ></ion-text>
    </ion-item>
  </ion-toolbar>
</ion-footer>
