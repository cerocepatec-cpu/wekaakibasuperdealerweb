<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-item lines="full">
      <ion-text class="font-bold-600 font-size-30" slot="start">Commandes</ion-text>
      <ion-text slot="start" color="primary" (click)="showcheckbox=!showcheckbox" *ngIf="!showcheckbox && listsorders.length>0">Sélectionner</ion-text>
      <ion-text slot="start" color="primary" (click)="showcheckbox=!showcheckbox; listselectedorders=[];" *ngIf="showcheckbox">Terminer</ion-text>
      <ion-icon name="add-circle-outline" slot="end" (click)="neworder()" *ngIf="!showcheckbox && appserv.permissionFilter('commandes','add')
      " size="large" color="primary"></ion-icon>
      <ion-icon name="print-outline" color="secondary" slot="end" *ngIf="!showcheckbox" size="large"></ion-icon>
      <ion-icon name="download-outline" color="success" slot="end" [matMenuTriggerFor]="menuexport" *ngIf="!showcheckbox" size="large"></ion-icon>
      <ion-icon name="share-outline" color="primary" slot="end" *ngIf="!showcheckbox" size="large"></ion-icon>
    </ion-item>
    <mat-menu #menuexport="matMenu">
      <button mat-menu-item ><ion-text class="font-size-12">Exporter en Excel</ion-text></button>
      <button mat-menu-item ><ion-text class="font-size-12">Exporter en PDF</ion-text></button>
    </mat-menu>
  </ion-toolbar>
  <ion-progress-bar type="indeterminate" mode="ios" *ngIf="showprogress" ></ion-progress-bar>
</ion-header>
<ion-content class="contentbody">

  <ion-item lines="none" class="contentbody margin-left-moins-15">
    <ion-searchbar class="font-size-11"  mode="ios" placeholder="Recherche" [(ngModel)]="keyword"></ion-searchbar>
    <ion-icon name="filter-outline" slot="end" [matMenuTriggerFor]="filter_menu" color="primary"></ion-icon>
    <mat-menu #filter_menu="matMenu">
      <button mat-menu-item> <ion-text class="font-size-11" color="danger">Annuler le filtre</ion-text></button>
      <button mat-menu-item> <ion-text class="font-size-11" >Confirmées</ion-text></button>
      <button mat-menu-item> <ion-text class="font-size-11" >Servies</ion-text></button>
      <button mat-menu-item> <ion-text class="font-size-11" >Non servies</ion-text></button>
      <button mat-menu-item> <ion-text class="font-size-11" >Payées</ion-text></button>
      <button mat-menu-item> <ion-text class="font-size-11" >Non payées</ion-text></button>
    </mat-menu>

  </ion-item>

  <ion-card class="bd-radius-10 ion-padding"  color="warning" *ngIf="listsorders.length===0">
    <ion-text class="font-size-13">Aucune commande diponible</ion-text>
  </ion-card>

  <ion-item class="default-list-item contentbody"  lines="inset" *ngFor="let invoice of listsorders | filter:keyword" (click)="ordermenu(invoice)" detail="true">
    <ion-checkbox slot="start" *ngIf="showcheckbox" mode="ios" size="small"></ion-checkbox>
    <ion-avatar slot="start">
      <ion-icon name="cash-outline" size="small"></ion-icon>
    </ion-avatar>
    <ion-label>
      <p class="item-label-title"><ion-text>{{invoice.invoice.customer_name | titlecase}}</ion-text></p>
      <p class="secondpara"><ion-text>Commande</ion-text></p>
    </ion-label>
    <ion-text slot="end">{{invoice.invoice.total | number}}$</ion-text>
  </ion-item>
</ion-content>
<ion-footer class="ion-no-border" [translucent]="true" *ngIf="showcheckbox && listselectedorders.length>0 && appserv.permissionFilter('commandes','delete')">
  <ion-toolbar>
    <ion-item lines="none" class="font-size-14">
      <ion-text slot="start" color="danger" (click)="multipledelete()"><ion-icon name="trash-outline"></ion-icon></ion-text>
    </ion-item>
  </ion-toolbar>
</ion-footer>
