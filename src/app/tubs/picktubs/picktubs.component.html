<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-item lines="none">
      <ion-icon name="chevron-back-outline" (click)="appserv.closemodal()" color="warning" size="large" slot="start"></ion-icon>
      <ion-label>
        <p> <ion-text>Sélection caisses</ion-text></p>
        <p>
          <span *ngFor="let item of listtubselected" class="font-size-10">
            {{item.description}}<ion-text class="font-size-10" *ngIf="listtubselected.length>0">;</ion-text> 
          </span>
        </p>
      </ion-label>
      <ion-chip slot="end" color="secondary" (click)="sendselected()" *ngIf="listtubselected.length>0">
        <ion-icon name="send-outline" size="small"></ion-icon>
      </ion-chip>
    </ion-item>
  </ion-toolbar>
</ion-header>
<ion-content>
  <ion-searchbar [(ngModel)]="search" mode="ios" placeholder="Recherche" #defaultinput></ion-searchbar>
  <ion-item class="default-list-item" lines="full" *ngFor="let tub of listtubs | filter: search" (click)="selectitem(tub)">
    <ion-label>
      <p class="item-label-title font-size-12">
        <ion-text>{{tub.description |titlecase}} ({{tub.money_abreviation}})</ion-text> 
      </p>
    </ion-label>
    <ion-icon name="checkmark-circle-outline" slot="end" size="small" *ngIf="tub.selected"></ion-icon>
  </ion-item>
</ion-content>
