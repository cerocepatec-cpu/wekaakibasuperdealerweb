<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-item lines="none">
      <ion-icon name="arrow-back-outline" slot="start" color="primary" (click)="appserv.closemodal()"></ion-icon>
      <ion-text slot="start" color="primary">Nouvelle caution</ion-text>
      <ion-icon name="checkmark-outline" size="large" color="success" slot="end" (click)="addnew()"></ion-icon>
    </ion-item>
    <ion-item lines="none" class="default-list-item2 colorleftside" mode="ios" lines="inset">
      <ion-label>
        <h2 class="font-size-13 item-label-title"><ion-text>Date opération</ion-text></h2>
      </ion-label> 
      <ion-chip class="font-size-11 secondpara">
       <ion-input type="date" [(ngModel)]="newcaution.done_at" class="font-size-12" label="Date"></ion-input>
     </ion-chip>
     </ion-item>
  </ion-toolbar>
  <ion-progress-bar type="indeterminate" mode="ios" *ngIf="showprogress" ></ion-progress-bar>
</ion-header>
<ion-content class="contentbody ion-padding">
  <ion-input type="number" [(ngModel)]="newcaution.amount" placeholder="Entrer le montant" class="bd-rounded box-big font-size-12" #defaultinput></ion-input>
</ion-content>
