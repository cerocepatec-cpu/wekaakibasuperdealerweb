<main id="mainContent" class="h-full overflow-none bg-white  transparent ">
  <app-notifications-center></app-notifications-center>
  <ion-router-outlet></ion-router-outlet>
 <ion-fab slot="fixed" vertical="bottom" horizontal="end" *ngIf="appserv.getactualuser().id" class="largedevicehidden">
    <ion-fab-button color="warning">
      <ion-icon name="settings"></ion-icon>
    </ion-fab-button>
    <ion-fab-list side="top">
      <ion-fab-button (click)="logout()">
        <ion-icon name="log-out"></ion-icon>
      </ion-fab-button>
      <ion-fab-button (click)="gotouserprofil()">
        <ion-icon name="person"></ion-icon>
      </ion-fab-button>
      <ion-fab-button (click)="gotoclosure()">
        <ion-icon name="lock-closed-outline"></ion-icon>
      </ion-fab-button>
    </ion-fab-list>
  </ion-fab>
</main>
