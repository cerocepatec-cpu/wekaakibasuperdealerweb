<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-item lines="full">
      <ion-text class="font-bold-600 font-size-30" slot="start">Tables</ion-text>
     <ion-icon  name="add-circle-outline" slot="end" (click)="newtable()" *ngIf="!showcheckbox && appserv.permissionFilter('tables','add')" size="large" color="primary"></ion-icon>
      <!-- <ion-text slot="start" color="primary" (click)="showcheckbox=!showcheckbox" *ngIf="!showcheckbox && listables.length>0">Sélectionner</ion-text> -->
      <ion-text slot="start" color="primary" (click)="showcheckbox=!showcheckbox; listselectedtables=[];" *ngIf="showcheckbox">Terminer</ion-text>
      <!-- <ion-icon name="print-outline" color="secondary" slot="end" *ngIf="!showcheckbox" size="large"></ion-icon> -->
      <!-- <ion-icon name="download-outline" color="success" slot="end" [matMenuTriggerFor]="menuexport" *ngIf="!showcheckbox" size="large"></ion-icon> -->
      <!-- <ion-icon name="share-outline" color="primary" slot="end" *ngIf="!showcheckbox" size="large"></ion-icon> -->
    </ion-item>
    <mat-menu #menuexport="matMenu">
      <button mat-menu-item ><ion-text class="font-size-12">Exporter en Excel</ion-text></button>
      <button mat-menu-item ><ion-text class="font-size-12">Exporter en PDF</ion-text></button>
    </mat-menu>
  </ion-toolbar>
  <ion-progress-bar type="indeterminate" mode="ios" *ngIf="showprogress" ></ion-progress-bar>
</ion-header>
<ion-content class="contentbody cartpreview-80">

  <ion-item lines="none" class="contentbody margin-left-moins-15">
    <ion-searchbar class="font-size-11"  mode="ios" placeholder="Recherche" [(ngModel)]="keyword"></ion-searchbar>
  </ion-item>

  <ion-card class="bd-radius-10 ion-padding"  color="warning" *ngIf="listables.length===0">
    <ion-text class="font-size-13">Aucune table disponible</ion-text>
  </ion-card>

  <ion-item mode="ios" class="default-list-item3 contentbody"  lines="full" *ngFor="let table of listables | filter:keyword" (click)="tablemenu(table)">
    <ion-checkbox slot="start" *ngIf="showcheckbox" mode="ios" size="small"></ion-checkbox>
    <ion-avatar slot="start"><ion-img src="../../assets/table.png"></ion-img></ion-avatar>
    <ion-label>
      <ion-text class="item-label-title">{{table.name | titlecase}}</ion-text>
      <h4 class="secondpara font-size-11"><ion-note>{{table.description | titlecase}}</ion-note></h4>
    </ion-label>
  </ion-item>
</ion-content>
<ion-footer class="ion-no-border" [translucent]="true" *ngIf="showcheckbox && listselectedtables.length>0 && appserv.permissionFilter('tables','delete')">
  <ion-toolbar>
    <ion-item lines="none" class="font-size-14">
      <ion-text slot="start" color="danger" (click)="multipledelete()"><ion-icon name="trash-outline"></ion-icon></ion-text>
    </ion-item>
  </ion-toolbar>
</ion-footer>
