<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-item lines="none">
      <ion-icon name="chevron-back-outline" (click)="appserv.closemodal()" slot="start"></ion-icon>
      <ion-text>Nouveau point de vente</ion-text>
      <ion-chip [disabled]="!posform.valid" slot="end" color="secondary" (click)="addpos()">
        <ion-icon name="checkmark-outline" color="primary" size="large" ></ion-icon>
      </ion-chip>
    </ion-item>
  </ion-toolbar>
  <ion-progress-bar type="indeterminate" *ngIf="showcreatingprogress" mode="ios"></ion-progress-bar>
</ion-header>
<ion-content class="contentbody" [fullscreen]="true">
  <br>
  <div class="mobileform">
    <form [formGroup]="posform">
      <ion-card mode="ios" class="ion-padding-top ion-padding-bottom">
        <ion-grid>
          <ion-row>
            <ion-col size="6">
              <ion-text class="font-size-12 ion-padding-start" color="primary">Statut</ion-text> 
              <br>
              <ion-segment formControlName="status" mode="ios">
                <ion-segment-button value="enabled">Activé</ion-segment-button>
                <ion-segment-button value="disabled">Désactivé</ion-segment-button>
              </ion-segment>
            </ion-col>
            <ion-col size="6">
              <ion-text class="font-size-12 ion-padding-start" color="primary">Type</ion-text> 
              <br>
              <ion-segment formControlName="type" mode="ios">
                <ion-segment-button value="bonus">Bonus</ion-segment-button>
                <ion-segment-button value="point">Point</ion-segment-button>
              </ion-segment>
            </ion-col>
          </ion-row>
        </ion-grid>
       
      </ion-card>
      <ion-card mode="ios" class="ion-padding-top">
        <ion-text class="font-size-12" color="primary ion-padding-start">Informations de base</ion-text>
        <ion-item lines="full" class="font-size-12">
          <ion-input formControlName="name" placeholder="Nom (*)"></ion-input>
        </ion-item>
        <ion-item lines="full" class="font-size-12">
          <ion-input formControlName="description" placeholder="description"></ion-input>
        </ion-item>
        <ion-item lines="full" class="font-size-12">
          <ion-input formControlName="phone" placeholder="Téléphone"></ion-input>
        </ion-item>
        <ion-item lines="full" class="font-size-12">
          <ion-input formControlName="mail" placeholder="Email"></ion-input>
        </ion-item>
        <ion-item lines="full" class="font-size-12">
          <ion-input formControlName="adresse" placeholder="Adresse"></ion-input>
        </ion-item>
      </ion-card>  
      <ion-card mode="ios">
        <ion-item lines="none" class="font-size-12">
          <ion-text color="primary" slot="start">Autres informations</ion-text>
        </ion-item>
        <div class="block">
          <ion-item lines="full" class="font-size-12">
            <ion-input formControlName="rccm" placeholder="RCCM"></ion-input>
          </ion-item>
          <ion-item lines="full" class="font-size-12">
            <ion-input formControlName="national_identification" placeholder="I.D"></ion-input>
          </ion-item>
          <ion-item lines="full" class="font-size-12">
            <ion-input formControlName="num_impot" placeholder="Numero impôt"></ion-input>
          </ion-item> 
          <ion-item lines="full" class="font-size-12">
            <ion-input formControlName="autorisation_fct" placeholder="Autorisation de fonctionnement"></ion-input>
          </ion-item>
          <ion-item lines="full" class="font-size-12">
            <ion-input formControlName="website" placeholder="Site de site"></ion-input>
          </ion-item>
          <ion-item lines="full" class="font-size-12">
            <ion-input formControlName="vat_rate" placeholder="TVA(%)"></ion-input>
          </ion-item> 
          <ion-item lines="full" class="font-size-12">
            <ion-textarea formControlName="invoicefooter" placeholder="Note de pied de page sur les factures"></ion-textarea>
          </ion-item>  
          <ion-item lines="full" class="font-size-12">
            <ion-textarea formControlName="nb_sales_bonus" placeholder="Nombre d'achat pour beneficier le bonus"></ion-textarea>
          </ion-item>
          <ion-item lines="full" class="font-size-12">
            <ion-textarea formControlName="workforce_percent" placeholder="% mains d'oeuvres"></ion-textarea>
          </ion-item>
        </div>
      </ion-card>
    </form>
  </div>
</ion-content>
