<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-item lines="full">
      <ion-text class="font-bold-600 font-size-30" slot="start">Dépôts</ion-text>
      <ion-icon name="chevron-up-outline" color="primary" slot="end" (click)="appserv.closemodal()"></ion-icon>
    </ion-item>
  </ion-toolbar>
  <ion-progress-bar type="indeterminate" *ngIf="showprogress" mode="ios" color="primary"></ion-progress-bar>
</ion-header>
<ion-content class="contentbody">
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content
      pullingIcon="chevron-down-circle-outline"
      pullingText="Pull to refresh"
      refreshingSpinner="circles"
      refreshingText="Recharge des données...">
    </ion-refresher-content>
  </ion-refresher>
 
  <ion-item lines="none" class="contentbody margin-left-moins-15">
    <ion-searchbar class="font-size-11"  mode="ios" [(ngModel)]="search" placeholder="Recherche"></ion-searchbar>
       
    <mat-menu #menuexport="matMenu">
      <button mat-menu-item > <ion-text class="font-size-11">Exporter en Excel</ion-text></button>
      <button mat-menu-item > <ion-text class="font-size-11">Exporter en PDF</ion-text></button>
    </mat-menu>
    
  </ion-item>

  <ion-item class="contentbody default-list-item" *ngFor="let deposit of listdeposits | filter:search" (click)="depositmenu(deposit)" lines="inset">
    <ion-avatar slot="start">
      <ion-icon name="document"></ion-icon>
    </ion-avatar>
    <ion-label>
      <p class="item-label-title">
        <ion-text>{{deposit.name | titlecase}}</ion-text> 
      </p>
      <p class="secondpara">
        <span class="reqtotalprinted font-size-11">{{deposit.description | titlecase}}</span>
      </p> 
    </ion-label>
    <ion-icon name="trash-outline" (click)="deletedeposit(deposit)"></ion-icon>
  </ion-item>
  <ion-fab slot="fixed" vertical="bottom" horizontal="end" (click)="adddeposit()">
    <ion-fab-button color="secondary">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
