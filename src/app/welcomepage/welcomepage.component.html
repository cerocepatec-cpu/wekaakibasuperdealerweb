<ion-header translucent="true" class="fintech-header ion-no-border">
  <ion-toolbar class="header-toolbar">
    <ion-grid>

      <!-- 🔹 ROW 1 : ENTREPRISE + SOLDES -->
      <ion-row class="top-header-row" align-items-center>

        <!-- 🏢 ENTREPRISE -->
        <ion-col size="6" size-md="6" class="company-info">
          <div class="company-name">
            <h2 class="company-title">
              <span>{{ appserv.getactualEse().name }}</span>
            </h2>

            <!-- tagline seulement desktop -->
            <p class="company-tagline ion-hide-md-down">
              {{ appserv.getactualEse().description }}
            </p>
          </div>
        </ion-col>

        <!-- 💰 SOLDES -->
        <ion-col size="6" size-md="6" class="header-actions">
          <div class="balance-display" [class.locking]="lockAnimation">

            <div class="balance-header">
              <ion-text class="balance-label">Soldes disponibles</ion-text>

              <ion-icon
                [name]="pinValidated ? 'eye-off-outline' : 'eye-outline'"
                class="toggle-eye"
                (click)="toggleBalanceVisibility()"
              ></ion-icon>
            </div>

            <ng-container *ngIf="pinValidated; else maskedBalances">
              <ng-container *ngIf="!loading && balances.length > 0; else loadingOrEmpty">
                <div class="balance-list">
                  <div *ngFor="let balance of balances" class="balance-item">
                    <h3 class="balance-amount">
                      {{ balance.total_sold | number }}
                      <span class="currency">{{ balance.abreviation }}</span>
                    </h3>
                  </div>
                </div>
              </ng-container>
            </ng-container>

            <ng-template #maskedBalances>
              <div class="balance-list masked">
                <div *ngFor="let balance of balances" class="balance-item">
                  <h3 class="balance-amount">
                    ••••••••
                    <span class="currency">{{ balance.abreviation }}</span>
                  </h3>
                </div>
              </div>
            </ng-template>

            <ng-template #loadingOrEmpty>
              <ion-spinner *ngIf="loading" name="dots"></ion-spinner>
              <ion-text *ngIf="!loading && balances.length === 0" color="medium">
                Aucun solde disponible
              </ion-text>
            </ng-template>

          </div>
        </ion-col>
      </ion-row>

      <!-- 🔹 ROW 2 : SEARCH + ACTION -->
   <div class="search-container">

  <ion-searchbar
    mode="ios"
    placeholder="Rechercher..."
    [(ngModel)]="search"
    class="search-flex"
    #defaultinput
  ></ion-searchbar>

  <ion-button
    *ngIf="appserv.permissionFilter('clotures', 'add')"
    fill="clear"
    class="action-btn smalldevicehidden"
    shape="round"
    (click)="gotoclosure()"
  >
    <ion-icon slot="start" name="lock-closed-outline"></ion-icon>
    Clôturer
  </ion-button>

</div>

    </ion-grid>
  </ion-toolbar>
</ion-header>
<ion-content class="content-items-list" fullscreen>
  <ion-grid class="home-dashboard-grid">
    <ng-container *ngFor="let group of filteredHomeCards">
      <ion-row>
        <ion-col size="12" class="category-title">
          <ion-text>{{ group.category }}</ion-text>
          <ion-divider></ion-divider>
        </ion-col>
      </ion-row>

      <ion-row>
        <ion-col
          size="6"
          size-sm="6"
          size-md="4"
          size-lg="3"
          *ngFor="let item of group.items | filter : search"
          class="column-welcome-page cursor-pointer"
          [routerLink]="item.router"
        >
          <div class="card-home-page dashboard-card" [ngClass]="item.bgClass">
            <div class="card-icon">
              <ion-icon [name]="item.icon" size="large"></ion-icon>
            </div>
            <ion-text class="card-label">
              {{ item.name | titlecase }}
            </ion-text>
          </div>
        </ion-col>
      </ion-row>
    </ng-container>
  </ion-grid>
</ion-content>
